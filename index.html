<!DOCTYPE html>
<html lang="ko">
<head>
    <meta id="viewport" name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cimilre 유두 사이즈 가이드</title>
    <style>
        /* 일반 웹 화면 UI 스타일 (PC & 모바일 공통) */
        body {
            margin: 0;
            padding: 20px;
            text-align: center;
            font-family: sans-serif;
            background-color: #f9f9f9;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 30px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .clickable-img {
            cursor: pointer;
            width: 100%;
            max-width: 400px;
            height: auto;
            border-radius: 8px;
            border: 1px solid #e1e1e1;
        }
        
        /* 평소에는 인쇄용 영역을 완전히 숨김 */
        #universal-print-zone {
            display: none;
        }

        /* 2. 프린트 인쇄 실행 시 스타일 */
        @media print {
            @page {
                size: A4 portrait;
                margin: 0mm; /* 여백을 0으로 하고 컨테이너에서 마진 제어 */
            }
            
            html, body {
                width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
                background: #fff !important;
            }

            /* 원래 화면 UI 삭제 */
            #web-ui-layout {
                display: none !important;
            }
            
            /* 인쇄 영역 활성화 */
            #universal-print-zone {
                display: block !important;
                width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
            }
            
            /* PC와 모바일 뷰포트 일치 후, 화면 가로에 가득 차게 설정 */
            #universal-print-zone img {
                display: block !important;
                width: 100% !important;
                height: auto !important;
                max-width: 100% !important;
                margin: 0 auto !important;
                page-break-inside: avoid;
            }
        }
    </style>
</head>
<body>

    <div id="web-ui-layout">
        <div class="container">
            <h3>이미지를 클릭하시면 프린트됩니다.</h3>
            <p></p>
            
            <img src="https://damipapa.github.io/test/dual max.jpg" 
                 class="clickable-img" 
                 onclick="forceResponsivePrint()">
        </div>
    </div>

    <div id="universal-print-zone">
        <img src="https://damipapa.github.io/test/guide.jpg">
    </div>

    <script>
        function forceResponsivePrint() {
            const viewport = document.getElementById('viewport');
            
            // 1. [핵심] 인쇄 직전, 모바일 뷰포트를 강제로 PC 규격(너비 1024px)으로 변경합니다.
            // 이렇게 하면 모바일 사파리가 "아, PC 화면이구나"라고 착각하여 축소 처리를 하지 않습니다.
            viewport.setAttribute('content', 'width=1024');

            // 2. 브라우저가 변경된 뷰포트를 반영할 수 있도록 0.2초 여유를 준 뒤 인쇄창을 엽니다.
            setTimeout(() => {
                window.print();

                // 3. 인쇄 창이 켜진 후(또는 사용자가 취소/완료를 누르고 돌아온 후) 
                // 다시 원래의 깨끗한 모바일 반응형 뷰포트로 원상복구합니다.
                setTimeout(() => {
                    viewport.setAttribute('content', 'width=device-width, initial-scale=1.0');
                }, 1000);
                
            }, 200);
        }
    </script>

</body>
</html>
