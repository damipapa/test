<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cimilre 유두 사이즈 가이드</title>
    <style>
        /* 1. 일반 웹 화면 스타일 */
        body {
            margin: 0;
            padding: 20px;
            text-align: center;
            font-family: sans-serif;
        }
        .clickable-img {
            cursor: pointer;
            width: 100%;
            max-width: 400px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* 평소에는 인쇄 전용 영역을 완전히 숨깁니다 (렌더링 트리에는 포함되도록) */
        #mobile-print-zone {
            visibility: hidden;
            position: absolute;
            left: -9999px;
            top: -9999px;
            width: 0;
            height: 0;
            overflow: hidden;
        }

        /* 🖨️ 2. 아이폰/모바일 프린트 옵션창이 켜질 때만 작동하는 스타일 */
        @media print {
            /* 브라우저 기본 상하단 주소창, 페이지 번호 강제 삭제 */
            @page {
                margin: 0;
            }
            
            /* 원래 웹 페이지의 모든 글자와 이미지를 통째로 지웁니다 */
            #web-ui-content {
                display: none !important;
            }
            
            /* 숨겨져 있던 인쇄 전용 영역을 프린트 창에만 정중앙에 꽉 차게 띄웁니다 */
            #mobile-print-zone {
                visibility: visible !important;
                position: static !important;
                display: flex !important;
                justify-content: center;
                align-items: center;
                width: 100vw;
                height: 100vh;
                margin: 0;
                padding: 0;
            }
            
            #mobile-print-zone img {
                max-width: 100% !important;
                max-height: 100% !important;
                object-fit: contain !important;
                display: block !important;
            }
        }
    </style>
</head>
<body>

    <div id="web-ui-content">
        <h3>아래 이미지를 터치(클릭)해 보세요.</h3>
        <p style="color: #666; font-size: 14px;">프린트를 시작합니다.</p>
        
        <img src="https://damipapa.github.io/test/dual max.jpg" 
             class="clickable-img" 
             onclick="triggerPurePrint()">
    </div>

    <div id="mobile-print-zone">
        <img src="https://damipapa.github.io/test/guide.jpg">
    </div>


    <script>
        function triggerPurePrint() {
            // 자바스크립트는 화면을 조작하지 않고 오직 프린트 창만 깨웁니다.
            // 인쇄 창이 켜지는 순간 @media print CSS가 발동하여 이미지를 낚아챕니다.
            window.print();
        }
    </script>

</body>
</html>
