<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cimilre 유두 사이즈 가이드</title>
    <style>
        /* ==========================================
           1. 일반 웹 화면 UI 스타일 (PC & 모바일 공통)
           ========================================== */
        body {
            margin: 0;
            padding: 20px;
            text-align: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f9f9f9;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 30px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h3 { margin-top: 0; color: #333; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; }

        /* 화면에 보이는 메인 이미지 */
        .clickable-img {
            cursor: pointer;
            width: 100%;
            max-width: 400px;
            height: auto;
            border-radius: 8px;
            border: 1px solid #e1e1e1;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }
        .clickable-img:hover { opacity: 0.9; }
        .clickable-img:active { transform: scale(0.98); }

        /* [중요] 평소에는 인쇄용 영역을 완전히 숨겨둡니다 */
        #universal-print-zone {
            display: none;
        }

        /* ==========================================
           2. 🖨️ 인쇄 실행 시 스타일 (PC & 모바일 공통 적용)
           ========================================== */
        @media print {
            /* 종이 여백을 제로로 만들어서 모바일 축소 버그를 방지합니다 */
            @page {
                size: auto;
                margin: 0mm;
            }
            
            /* 인쇄 시 브라우저의 기본 UI 구조를 강제 초기화 */
            html, body {
                width: 100% !important;
                height: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
                background: #fff !important;
            }

            /* 원래 화면에 있던 모든 글자와 버튼, 레이아웃을 통째로 숨깁니다 */
            #web-ui-layout {
                display: none !important;
            }
            
            /* 숨겨져 있던 인쇄 영역을 깨우고 화면 전체를 차지하게 합니다 */
            #universal-print-zone {
                display: block !important;
                width: 100% !important;
                height: auto !important;
                margin: 0 !important;
                padding: 0 !important;
            }
            
            /* 인쇄용 이미지를 종이 가로폭(100%)에 꽉 차게 맞추고 비율을 고정합니다 */
            #universal-print-zone img {
                display: block !important;
                width: 100% !important;   /* 종이 가로폭에 100% 채움 */
                height: auto !important;   /* 원본 비율 유지 */
                max-width: 100% !important;
                margin: 0 auto !important;
                page-break-inside: avoid;  /* 이미지 중간 잘림 방지 */
            }
        }
    </style>
</head>
<body>

    <div id="web-ui-layout">
        <div class="container">
            <h3>이미지를 클릭(터치)하세요</h3>
            <p>프린트를 시작합니다.</p>
            
            <img src="https://damipapa.github.io/test/dual%20max.jpg" 
                 class="clickable-img" 
                 onclick="runUniversalPrint()">
        </div>
    </div>

    <div id="universal-print-zone">
        <img src="https://damipapa.github.io/test/guide.jpg">
    </div>

    <script>
        function runUniversalPrint() {
            // PC 사파리, 아이폰 iOS 등 모든 환경에서 
            // @media print CSS가 즉시 동기적으로 발동되도록 기본 print 명령만 내립니다.
            window.print();
        }
    </script>

</body>
</html>
