<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cimilre 유두 사이즈 가이드</title>
    <style>
        .clickable-img {
            cursor: pointer;
            width: 100%;
            max-width: 400px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        /* 🔥 중요: 인쇄용 원본 이미지를 화면에는 안 보이게 배경에 미리 띄워둡니다.
          display: none을 쓰면 브라우저가 로딩을 안 하므로, 크기를 0으로 해서 숨깁니다.
        */
        .hidden-preload-img {
            position: absolute;
            width: 0;
            height: 0;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div style="padding: 20px; text-align: center;">
        <h3>아래 이미지를 클릭(터치)하시면 인쇄를 시작합니다.</h3>
        
        <img src="https://damipapa.github.io/test/DUALPRO_HT5.png" 
             class="clickable-img" 
             onclick="printPreloadedImage()">
             
        <img id="my-print-image" 
             src="https://damipapa.github.io/test/guide.jpg" 
             class="hidden-preload-img">
    </div>

    <script>
        function printPreloadedImage() {
            // 미리 로드되고 있는 이미지 엘리먼트를 가져옵니다.
            const originImg = document.getElementById('my-print-image');
            
            // 이미지 주소 추출
            const printImgSrc = originImg.src;

            // 기존 인쇄 프레임 제거
            const oldFrame = document.getElementById('photo-print-frame');
            if (oldFrame) oldFrame.remove();

            // 숨겨진 iframe 생성
            const iframe = document.createElement('iframe');
            iframe.id = 'photo-print-frame';
            iframe.style.position = 'fixed';
            iframe.style.width = '0';
            iframe.style.height = '0';
            iframe.style.border = '0';
            document.body.appendChild(iframe);

            const pri = iframe.contentWindow;
            pri.document.open();
            pri.document.write('<html><head><title>Print</title>');
            pri.document.write('<style>@page { margin: 0; } body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }</style>');
            pri.document.write('</head><body>');
            // 이미 캐시에 저장된 이미지 주소가 들어갑니다.
            pri.document.write('<img id="print-target" src="' + printImgSrc + '" style="max-width:100%; max-height:100%; object-fit:contain;">');
            pri.document.write('</body></html>');
            pri.document.close();

            const printImg = pri.document.getElementById('print-target');
            
            // 모바일 사파리/크롬 브라우저가 두 번 확인할 수 있도록 만전을 기함
            if (printImg.complete) {
                // 이미 캐싱 완료되었다면 바로 인쇄 실행
                runPrint(pri, iframe);
            } else {
                // 혹시나 아직 로딩 중이라면 로드 완료 후 실행
                printImg.onload = function() {
                    runPrint(pri, iframe);
                };
            }
        }

        function runPrint(pri, iframe) {
            // 모바일 기기가 iframe 내부 컨텐츠를 인식할 수 있도록 0.3초의 아주 짧은 여유를 줍니다.
            setTimeout(() => {
                pri.focus();
                pri.print();
                setTimeout(() => { iframe.remove(); }, 1500);
            }, 300);
        }
    </script>

</body>
</html>
