<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>화면/인쇄 이미지 다르게 설정</title>
    <style>
        .clickable-img {
            cursor: pointer;
            width: 100%;
            max-width: 400px;
            border: 2px solid #ddd;
            border-radius: 8px;
            transition: transform 0.2s;
        }
        .clickable-img:active {
            transform: scale(0.98); /* 모바일 터치 피드백 */
        }
    </style>
</head>
<body>

    <div style="padding: 20px; text-align: center;">
        <h3>화면 이미지와 인쇄 이미지가 다르게 작동합니다.</h3>
        <p style="color: #666; font-size: 14px;">아래 이미지를 누르면 프린트 창에는 다른 이미지가 나타납니다.</p>
        
        <img src="https://drive.google.com/file/d/1KPSvRpw29QdoqnH6F2K_nRzql2tunLOc/view?usp=sharing" 
             data-print="https://drive.google.com/file/d/1QTXMJn5pLldHMT7ATWvR4gp-yyAfmWWX/view?usp=sharing" 
             class="clickable-img" 
             onclick="printCustomImage(this)">
    </div>

    <script>
        async function printCustomImage(element) {
            // 태그에 심어둔 'data-print' 속성에서 인쇄용 이미지 주소를 가져옵니다.
            const printImgSrc = element.getAttribute('data-print');
            
            if (!printImgSrc) {
                alert("인쇄용 이미지가 지정되지 않았습니다.");
                return;
            }

            try {
                // 1. 모바일 엑박 방지를 위해 인쇄용 이미지를 Blob 데이터로 미리 다운로드
                const response = await fetch(printImgSrc);
                const blob = await response.blob();
                const blobUrl = URL.createObjectURL(blob);

                // 2. 기존 인쇄 프레임 제거 및 새로 생성
                const oldFrame = document.getElementById('photo-print-frame');
                if (oldFrame) oldFrame.remove();

                const iframe = document.createElement('iframe');
                iframe.id = 'photo-print-frame';
                iframe.style.position = 'fixed';
                iframe.style.width = '0';
                iframe.style.height = '0';
                iframe.style.border = '0';
                document.body.appendChild(iframe);

                const pri = iframe.contentWindow;
                pri.document.open();
                pri.document.write('<html><head><title>Print</title>');
                pri.document.write('<style>@page { margin: 0; } body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }</style>');
                pri.document.write('</head><body>');
                // 다운로드된 프린트용 고유 Blob URL 삽입
                pri.document.write('<img id="print-target" src="' + blobUrl + '" style="max-width:100%; max-height:100%; object-fit:contain;">');
                pri.document.write('</body></html>');
                pri.document.close();

                const printImg = pri.document.getElementById('print-target');
                
                // 3. 이미지 디코딩 및 로딩 완료 후 인쇄 실행 (모바일 완벽 대응)
                printImg.onload = function() {
                    if (typeof printImg.decode === 'function') {
                        printImg.decode().then(() => {
                            executePrint(pri, iframe, blobUrl);
                        }).catch(() => {
                            executePrint(pri, iframe, blobUrl);
                        });
                    } else {
                        executePrint(pri, iframe, blobUrl);
                    }
                };

            } catch (error) {
                console.error("이미지 로드 실패 (CORS 문제일 수 있습니다):", error);
                alert("인쇄용 이미지를 불러오는 데 실패했습니다. 이미지 주소를 확인해 주세요.");
            }
        }

        function executePrint(pri, iframe, blobUrl) {
            setTimeout(() => {
                pri.focus();
                pri.print();
                
                // 인쇄 종료 후 정리
                setTimeout(() => {
                    iframe.remove();
                    URL.revokeObjectURL(blobUrl);
                }, 1000);
            }, 100);
        }
    </script>

</body>
</html>
