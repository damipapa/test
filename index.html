<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cimilre 유두 사이즈 가이드</title>
    <style>
        /* 기본 웹사이트 스타일 */
        body {
            margin: 0;
            padding: 20px;
            text-align: center;
            font-family: sans-serif;
        }
        .clickable-img {
            cursor: pointer;
            width: 100%;
            max-width: 400px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* 🖨️ 인쇄할 때의 전용 스타일 설정 */
        @media print {
            /* 원래 있던 모든 본문 내용을 인쇄 화면에서 숨깁니다 */
            #web-content {
                display: none !important;
            }
            /* 오직 인쇄용으로 만든 영역만 화면에 꽉 차게 보여줍니다 */
            #print-zone {
                display: flex !important;
                justify-content: center;
                align-items: center;
                width: 100vw;
                height: 100vh;
            }
            #print-zone img {
                max-width: 100%;
                max-height: 100%;
                object-fit: contain;
            }
            /* 인쇄 시 브라우저가 기본으로 넣는 상하단 주소/날짜 여백 제거 */
            @page {
                margin: 0;
            }
        }
    </style>
</head>
<body>

    <div id="web-content">
        <h3>아래 이미지를 클릭(터치)하시면 인쇄를 시작합니다.</h3>
        <p style="color: #666; font-size: 14px;">모바일 대응</p>
        
        <img src="https://damipapa.github.io/test/dual max.jpg" 
             data-print="https://damipapa.github.io/test/guide.jpg" 
             class="clickable-img" 
             onclick="forceMobilePrint(this)">
    </div>

    <div id="print-zone" style="display: none;"></div>


    <script>
        function forceMobilePrint(element) {
            const printImgSrc = element.getAttribute('data-print');
            if (!printImgSrc) return;

            const printZone = document.getElementById('print-zone');

            // 1. 인쇄 영역에 고화질 프린트용 이미지를 주입합니다.
            printZone.innerHTML = '<img id="final-print-target" src="' + printImgSrc + '">';
            
            const finalImg = document.getElementById('final-print-target');

            // 2. 이미지가 모바일 메모리에 로드된 것을 확인한 후 작동
            finalImg.onload = function() {
                
                // [핵심] 모바일 브라우저 속이기: 
                // 인쇄 창을 켜기 직전, 화면 전체를 인쇄용 이미지 영역으로 강제 교체합니다.
                document.getElementById('web-content').style.display = 'none';
                printZone.style.display = 'flex';

                // 모바일 기기가 바뀐 화면을 완전히 인식하도록 0.3초 여유를 준 뒤 인쇄 팝업 호출
                setTimeout(() => {
                    window.print();
                    
                    // 인쇄 창이 닫히거나 취소되었을 때 원래 화면으로 복구합니다.
                    setTimeout(() => {
                        document.getElementById('web-content').style.display = 'block';
                        printZone.style.display = 'none';
                        printZone.innerHTML = ''; // 메모리 정리
                    }, 500);

                }, 300);
            };
            
            // 캐시된 이미지일 경우 onload가 안 지날 수 있으므로 예외 처리
            if (finalImg.complete) {
                finalImg.onload();
            }
        }
    </script>

</body>
</html>
