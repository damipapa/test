<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cimilre 유두 사이즈 가이드</title>
    <style>
        /* ==========================================
           1. 일반 웹 화면 UI 스타일 (PC & 모바일 공통)
           ========================================== */
        body {
            margin: 0;
            padding: 20px;
            text-align: center;
            font-family: sans-serif;
            background-color: #f9f9f9;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 30px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .clickable-img {
            cursor: pointer;
            width: 100%;
            max-width: 400px;
            height: auto;
            border-radius: 8px;
            border: 1px solid #e1e1e1;
        }
        
        /* 평소에는 인쇄용 영역을 완전히 숨김 */
        #universal-print-zone {
            display: none;
        }

        /* ==========================================
           2. 🖨️ 인쇄 실행 시 스타일 (모바일 축소 절대 방어)
           ========================================== */
        @media print {
            /* 기본 여백을 의도적으로 약간 주어 안정적인 마진 확보 */
            @page {
                size: A4 portrait; /* A4 세로 방향 명시 */
                margin: 10mm;      /* 상하좌우 10mm 여백 */
            }
            
            /* 인쇄 시 브라우저 UI 초기화 */
            html, body {
                width: 100% !important;
                height: auto !important;
                margin: 0 !important;
                padding: 0 !important;
                background: #fff !important;
            }

            /* 기존 웹 화면 UI는 삭제 */
            #web-ui-layout {
                display: none !important;
            }
            
            /* 인쇄 영역을 정중앙 정렬로 배치 */
            #universal-print-zone {
                display: flex !important;
                justify-content: center;
                align-items: flex-start;
                width: 100% !important;
                margin: 0 !important;
                padding: 0 !important;
            }
            
            /* 🔥 핵심: %나 px 대신 실제 출력 크기인 'mm'를 사용합니다.
              A4 폭(210mm)에서 좌우 여백(20mm)을 뺀 실제 가로 꽉 찬 크기인 190mm 지정
            */
            #universal-print-zone img {
                display: block !important;
                width: 190mm !important;  /* 💡 모바일 브라우저의 뷰포트를 무시하는 절대 수치 */
                height: auto !important;   /* 세로 비율은 원본 그대로 유지 */
                max-width: 190mm !important;
                margin: 0 auto !important;
                page-break-inside: avoid;
            }
        }
    </style>
</head>
<body>

    <div id="web-ui-layout">
        <div class="container">
            <h3>이미지를 터치(클릭)하시면 프린트됩니다.</h3>
            <p></p>
            
            <img src="https://damipapa.github.io/test/dual%20max.jpg" 
                 class="clickable-img" 
                 onclick="window.print()">
        </div>
    </div>

    <div id="universal-print-zone">
        <img src="https://damipapa.github.io/test/guide.jpg">
    </div>

</body>
</html>
