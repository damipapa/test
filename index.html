<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cimilre 유두 사이즈 가이드</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            text-align: center;
            font-family: sans-serif;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .clickable-img {
            cursor: pointer;
            width: 100%;
            max-width: 350px;
            border: 1px solid #ddd;
            border-radius: 6px;
            transition: transform 0.2s;
        }
        .clickable-img:active {
            transform: scale(0.98);
        }
        .notice {
            color: #d9534f;
            font-size: 13px;
            font-weight: bold;
            margin-top: 15px;
        }

        /* 프린트 전용 숨김 레이아웃 (PC용) */
        #pc-print-zone { display: none; }

        @media print {
            @page { size: A4 portrait; margin: 0; }
            html, body { width: 100%; height: 100%; margin: 0; padding: 0; }
            #web-ui-content { display: none !important; }
            #pc-print-zone {
                display: block !important;
                width: 100%;
                height: 100%;
            }
            #pc-print-zone img {
                width: 100%;
                height: auto;
            }
        }
    </style>
</head>
<body>

    <div id="web-ui-content">
        <div class="container">
            <h3>유두 사이즈 가이드</h3>
            <p>아래 이미지를 터치(클릭)하시면 출력을 시작합니다.</p>
            
            <img src="https://damipapa.github.io/test/dual%20max.jpg" 
                 class="clickable-img" 
                 onclick="handleResponsivePrint()">
                 
            <div class="notice">※ 모바일 인쇄 시 옵션에서 '기본 크기(100%)'를 꼭 선택해 주세요!</div>
        </div>
    </div>

    <div id="pc-print-zone">
        <img src="https://damipapa.github.io/test/guide.jpg">
    </div>

    <script>
        function handleResponsivePrint() {
            // 1. 모바일 기기(아이폰, 안드로이드)인지 판별합니다.
            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

            if (isMobile) {
                // 2. [모바일인 경우] 강제 여백을 먹이는 웹 인쇄 대신, 
                // 미리 준비한 실측 A4 PDF 파일 링크를 새 창으로 엽니다.
                // 브라우저 팝업 차단을 피하기 위해 즉시 이동시킵니다.
                
                const pdfUrl = "https://damipapa.github.io/test/guide.pdf"; 
                
                // 모바일 사파리/크롬에서 PDF 전용 뷰어로 열기
                window.location.href = pdfUrl;
            } else {
                // 3. [PC인 경우] 기존 웹 인쇄 코드가 완벽하게 작동하므로 그대로 실행합니다.
                window.print();
            }
        }
    </script>

</body>
</html>
