<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cimilre 유두 사이즈 가이드</title>
    
    <link rel="stylesheet" href="https://printjs-401cc.kxcdn.com/print.min.css">
    <script src="https://printjs-401cc.kxcdn.com/print.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 20px;
            text-align: center;
            font-family: sans-serif;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .clickable-img {
            cursor: pointer;
            width: 100%;
            max-width: 350px;
            border: 1px solid #ddd;
            border-radius: 6px;
            transition: transform 0.2s;
        }
        .clickable-img:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="container">
        <h3>유두 사이즈 가이드</h3>
        <p>아래 이미지를 터치(클릭)를 하시면 출력을 시작합니다.</p>
        
        <img src="https://damipapa.github.io/test/dual%20max.jpg" 
             class="clickable-img" 
             onclick="startPerfectPrint()">
    </div>

    <script>
        function startPerfectPrint() {
            // 실제 인쇄할 고화질/실측 원본 이미지 주소
            const realPrintImgSrc = "https://damipapa.github.io/test/guide.pdf";

            // printJS 라이브러리를 실행하여 모바일 사파리 엔진에 직접 주입합니다.
            printJS({
                printable: realPrintImgSrc, // 인쇄할 이미지 경로
                type: 'image',              // 타겟 타입은 이미지
                style: '@page { size: A4 portrait; margin: 0mm; } body { margin: 0; } img { width: 100%; height: auto; }', 
                // ↑ 여백을 0으로 만들어 모바일 축소를 방지하는 특수 CSS 주입
                
                documentTitle: '계측 가이드', // 문서 제목
                showModal: true,            // 모바일에서 로딩 중일 때 인디케이터 표시
                modalMessage: '인쇄 화면을 준비 중입니다...'
            });
        }
    </script>

</body>
</html>
