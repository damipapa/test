<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cimilre 유두 사이즈 가이드</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 20px;
            text-align: center;
            font-family: sans-serif;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .clickable-img {
            cursor: pointer;
            width: 100%;
            max-width: 350px;
            border: 1px solid #ddd;
            border-radius: 6px;
            transition: transform 0.2s;
        }
        .clickable-img:active {
            transform: scale(0.98);
        }
        .status-text {
            display: none;
            color: #007aff;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h3>유두 사이즈 가이드</h3>
        <p>이미지를 터치(클릭)하면 프린트 옵션 창이 열립니다.</p>
        
        <img src="https://damipapa.github.io/test/dual%20max.jpg" 
             class="clickable-img" 
             onclick="generateExactPdfPrint()">
             
        <div id="status" class="status-text">실측 데이터를 매칭 중입니다...</div>
    </div>

    <script>
        async function generateExactPdfPrint() {
            const statusText = document.getElementById('status');
            statusText.style.display = 'block';

            // 실제 인쇄할 원본 계측 가이드 이미지 경로를 적어주세요.
            // CORS 보안 문제를 피하기 위해 내 웹 서버에 올린 상대경로(예: 'img/guide.png')를 강력 권장합니다.
            const originImgSrc = "guide.jpg"; 

            try {
                const { jsPDF } = window.jspdf;
                
                // 1. 인쇄 이미지를 불러와 물리적인 픽셀 크기를 계산합니다.
                const img = new Image();
                img.crossOrigin = "Anonymous"; // CORS 우회 시도
                img.src = originImgSrc;
                
                img.onload = function() {
                    // 2. 가로 210mm, 세로 297mm의 정확한 물리적 A4 도화지를 생성합니다.
                    const pdf = new jsPDF('p', 'mm', 'a4');
                    
                    // 3. 도화지 여백을 0으로 꽉 차게 이미지를 드로잉합니다.
                    pdf.addImage(img, 'PNG', 0, 0, 210, 297);
                    
                    // 4. 가상 PDF 데이터를 바이너리 데이터(Blob)로 변환합니다.
                    const pdfBlob = pdf.output('blob');
                    const pdfUrl = URL.createObjectURL(pdfBlob);

                    // 5. 숨겨진 iframe을 만들어 모바일 사파리 인쇄 엔진에 다이렉트 주입
                    const oldFrame = document.getElementById('exact-pdf-frame');
                    if (oldFrame) oldFrame.remove();

                    const iframe = document.createElement('iframe');
                    iframe.id = 'exact-pdf-frame';
                    iframe.style.position = 'fixed';
                    iframe.style.width = '0';
                    iframe.style.height = '0';
                    iframe.style.border = '0';
                    iframe.src = pdfUrl;
                    
                    document.body.appendChild(iframe);

                    // 6. 인쇄 엔진이 로드되면 프린트 팝업 즉시 실행
                    iframe.onload = function() {
                        setTimeout(() => {
                            iframe.contentWindow.focus();
                            iframe.contentWindow.print();
                            statusText.style.display = 'none';
                        }, 350);
                    };
                };

                img.onerror = function() {
                    throw new Error("이미지 로드 실패");
                };

            } catch (error) {
                console.error(error);
                statusText.style.display = 'none';
                alert("인쇄 도중 보안 에러가 발생했습니다. 인쇄용 이미지를 외부 링크가 아닌 본인 웹 서버 폴더에 업로드한 뒤 상대 경로로 지정해 주세요.");
            }
        }
    </script>

</body>
</html>
